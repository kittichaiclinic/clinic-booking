function getBookingDateKey(b) {
  if (b.dateKey && /^\d{4}-\d{2}-\d{2}/.test(b.dateKey)) return b.dateKey;
  // parse จาก date string ที่อาจเป็น "23 พฤษภาคม 2569" หรือ Date format
  const s = String(b.date || "");
  // yyyy-mm-dd หรือ ISO
  const isoM = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoM) return isoM[1] + "-" + isoM[2] + "-" + isoM[3];
  // "Wed May 27 2026 ..."
  const dtM = s.match(/(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  if (dtM) {
    const enMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const mi = enMonths.findIndex(mn => dtM[1].startsWith(mn));
    if (mi >= 0) return dtM[3] + "-" + String(mi + 1).padStart(2, "0") + "-" + String(dtM[2]).padStart(2, "0");
  }
  // "23 พฤษภาคม 2569"
  const thMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
  const thM = s.match(/(\d{1,2})\s+([฀-๿]+)\s+(\d{4})/);
  if (thM) {
    const mi = thMonths.indexOf(thM[2]);
    if (mi >= 0) {
      const ceYear = parseInt(thM[3]) - 543;
      return ceYear + "-" + String(mi + 1).padStart(2, "0") + "-" + String(thM[1]).padStart(2, "0");
    }
  }
  return "";
}

// แปลงวันที่ทุกรูปแบบให้เป็นภาษาไทยเสมอ
function formatBookingDate(dateStr) {
  if (!dateStr) return "-";
  const s = String(dateStr);
  const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

  // yyyy-mm-dd หรือ ISO T format
  const isoM = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoM) {
    const y = parseInt(isoM[1]),
      m = parseInt(isoM[2]),
      d = parseInt(isoM[3]);
    return `${d} ${months[m - 1]} ${y + 543}`;
  }

  // "Wed May 27 2026 ..." หรือ "Mon May 25 2026 ..." รูปแบบ Date.toString()
  // format: DayName MonthName DayNum Year ...
  const enMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  // จับ MonthName DayNum Year
  const dtM = s.match(/(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  if (dtM) {
    const mi = enMonths.findIndex(mn => dtM[1].startsWith(mn));
    if (mi >= 0) {
      const y = parseInt(dtM[3]),
        d = parseInt(dtM[2]);
      return `${d} ${months[mi]} ${y + 543}`;
    }
  }
  // fallback: จับ MonthName DayNum Year โดยไม่มีชื่อวัน
  const dtM2 = s.match(/([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  if (dtM2) {
    const mi = enMonths.findIndex(mn => dtM2[1].startsWith(mn));
    if (mi >= 0) {
      const y = parseInt(dtM2[3]),
        d = parseInt(dtM2[2]);
      return `${d} ${months[mi]} ${y + 543}`;
    }
  }

  // ภาษาไทยอยู่แล้ว
  return s;
}
